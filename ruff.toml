indent-width = 4
line-length = 100

[lint]
select = ["ALL"]
ignore = [
  "EM101", # raw-string-in-exception
]
fixable = ["ALL"]
unfixable = []

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[lint.pydocstyle]
convention = "google"

[lint.isort]
known-first-party = ["packy"]